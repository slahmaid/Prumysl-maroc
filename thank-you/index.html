    <style>
        body {
            background-color: #f9f9f9;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .thank-you-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }
        .success-card {
            background: white;
            padding: 50px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        .success-icon {
            width: 80px;
            height: 80px;
            background: #e8f5e9;
            color: #2e7d32;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 25px;
        }
        .success-card h1 {
            color: #333;
            font-size: 2.2rem;
            margin-bottom: 15px;
        }
        .success-card p {
            color: #666;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }
        .order-details {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 30px;
            font-weight: 600;
            color: #0056b3;
        }
        .site-footer {
            margin-top: auto;
        }
    </style>
</head>
<body>

    <header class="site-header">
        <div class="header-logo" style="margin: 0 auto;">
            <a href="/">
                <img src="/img/logo.png" alt="شعار Prumysl" width="150" height="50" loading="eager">
            </a>
        </div>
    </header>

    <div class="thank-you-container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>شكراً لك يا <span id="customer-name">عزيزي</span>!</h1>
            
            <p>تم استلام طلبك بنجاح. سيتصل بك فريقنا في أقرب وقت (غالباً خلال 24 ساعة) لتأكيد العنوان وموعد التوصيل.</p>

            <div class="order-details">
                المنتج المطلوب: <span id="product-name">...</span>
            </div>

            <a href="/" class="btn-primary" style="display: inline-block; text-decoration: none;">العودة للصفحة الرئيسية</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-copyright" style="text-align: center;">
                <p>جميع الحقوق محفوظة © 2026 Prumysl</p>
            </div>
        </div>
    </footer>

    <script>
        // Ensure all images are visible
        document.addEventListener('DOMContentLoaded', function() {
            const allImages = document.querySelectorAll('img');
            allImages.forEach(function(img) {
                img.style.opacity = '1';
                if (!img.complete) {
                    img.onload = function() { this.style.opacity = '1'; };
                    img.onerror = function() { this.style.opacity = '1'; };
                }
            });
        });

        // Get parameters from the URL
        const urlParams = new URLSearchParams(window.location.search);
        const product = urlParams.get('product');
        const name = urlParams.get('name');

        function thankYouPurchasePayload(productParam) {
            const raw = (productParam || '').trim();
            const unit = 699;
            const currency = 'MAD';
            if (raw === '2_camera') {
                return {
                    contentId: 'MOKA-PRO-MAX',
                    contentName: 'Prumysl Moka Pro Max',
                    value: unit * 2,
                    numItems: 2,
                    currency: currency
                };
            }
            if (raw === '1_camera') {
                return {
                    contentId: 'MOKA-PRO-MAX',
                    contentName: 'Prumysl Moka Pro Max',
                    value: unit,
                    numItems: 1,
                    currency: currency
                };
            }
            return {
                contentId: 'PRUMYSL-ORDER',
                contentName: raw || 'Prumysl order',
                value: unit,
                numItems: 1,
                currency: currency
            };
        }

        function thankYouTtqContents(pp) {
            return [{
                content_id: pp.contentId,
                content_type: 'product',
                content_name: pp.contentName
            }];
        }

        // Update the page content dynamically
        if (product) {
            document.getElementById('product-name').textContent = product;
        }
        if (name) {
            // Take only the first name for a friendlier touch
            const firstName = name.split(' ')[0];
            document.getElementById('customer-name').textContent = firstName;
        }

        // Meta + TikTok (identify before conversion events when hashes exist in sessionStorage)
        if (product) {
            const pp = thankYouPurchasePayload(product);
            if (typeof fbq !== 'undefined') {
                fbq('track', 'Purchase', {
                    content_type: 'product',
                    content_ids: [pp.contentId],
                    currency: pp.currency,
                    value: pp.value,
                    num_items: pp.numItems
                });
            }
            if (typeof ttq !== 'undefined' && typeof ttq.ready === 'function') {
                ttq.ready(function () {
                    try {
                        const idRaw = sessionStorage.getItem('prumysl_ttq_ident');
                        if (idRaw) {
                            const o = JSON.parse(idRaw);
                            ttq.identify({
                                phone_number: o.phone_number,
                                external_id: o.external_id
                            });
                            sessionStorage.removeItem('prumysl_ttq_ident');
                        }
                    } catch (_) {}
                    const c = thankYouTtqContents(pp);
                    ttq.track('ViewContent', {
                        contents: c,
                        value: pp.value,
                        currency: pp.currency
                    });
                    ttq.track('AddPaymentInfo', {
                        contents: c,
                        value: pp.value,
                        currency: pp.currency
                    });
                    ttq.track('Purchase', {
                        contents: c,
                        value: pp.value,
                        currency: pp.currency
                    });
                });
            }
        }
    </script>

</body>
</html>
