<body>

    <header class="site-header">
        <div class="header-logo" style="margin: 0 auto;">
            <a href="/moka/">
                <img src="../../img/logo.png" alt="شعار Prumysl" width="150" height="50" loading="eager">
            </a>
        </div>
    </header>

    <div class="thank-you-container">
        <div class="success-card">
            <div class="success-icon">✓</div>
            <h1>شكراً لك يا <span id="customer-name">عزيزي</span>!</h1>
            <p>تم استلام طلب <strong>كاميرا موكا</strong> بنجاح. سيتصل بك فريقنا خلال 24 ساعة لتأكيد العنوان وموعد التوصيل.</p>
            <div class="order-details">
                المنتج: <span id="product-name">كاميرا موكا الذكية</span>
                <div class="price-line">المجموع: <span id="order-total">599</span> درهم — <span id="order-qty">1</span> قطعة</div>
            </div>
            <a href="/moka/" class="btn-primary" style="display: inline-block; text-decoration: none;">العودة لصفحة موكا</a>
        </div>
    </div>

    <footer class="site-footer">
        <div class="container">
            <div class="footer-copyright" style="text-align: center;">
                <p>جميع الحقوق محفوظة © 2026 Prumysl</p>
            </div>
        </div>
    </footer>

    <script>
        const MOKA_CONTENT_ID = 'MOKA-4G-DUAL';
        const MOKA_UNIT_PRICE = 599;
        const MOKA_CURRENCY = 'MAD';

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name') || '';
        const productOffer = params.get('product') || '1_camera';

        const numItems = productOffer === '2_camera' ? 2 : 1;
        const orderValue = MOKA_UNIT_PRICE * numItems;

        if (name) {
            document.getElementById('customer-name').textContent = name.trim().split(/\s+/)[0];
        }
        document.getElementById('order-total').textContent = String(orderValue);
        document.getElementById('order-qty').textContent = String(numItems);

        const ttqContents = [{
            content_id: MOKA_CONTENT_ID,
            content_type: 'product',
            content_name: 'Prumysl كاميرا موكا'
        }];

        if (typeof fbq !== 'undefined') {
            fbq('track', 'Purchase', {
                content_type: 'product',
                content_ids: [MOKA_CONTENT_ID],
                content_name: 'Prumysl كاميرا موكا',
                currency: MOKA_CURRENCY,
                value: orderValue,
                num_items: numItems
            });
        }

        if (typeof ttq !== 'undefined' && typeof ttq.ready === 'function') {
            ttq.ready(function () {
                try {
                    const idRaw = sessionStorage.getItem('prumysl_ttq_ident');
                    if (idRaw) {
                        const o = JSON.parse(idRaw);
                        ttq.identify({
                            phone_number: o.phone_number,
                            external_id: o.external_id
                        });
                        sessionStorage.removeItem('prumysl_ttq_ident');
                    }
                } catch (_) {}
                ttq.track('Purchase', {
                    contents: ttqContents,
                    value: orderValue,
                    currency: MOKA_CURRENCY
                });
            });
        }
    </script>
